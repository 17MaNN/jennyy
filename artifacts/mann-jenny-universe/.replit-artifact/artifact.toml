kind = "web"
previewPath = "/"
title = "Mann & Jenny's Universe"
version = "1.0.0"
id = "artifacts/mann-jenny-universe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21296

[services.development]
run = "pnpm --filter @workspace/mann-jenny-universe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mann-jenny-universe", "run", "build" ]
publicDir = "artifacts/mann-jenny-universe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21296"
BASE_PATH = "/"
